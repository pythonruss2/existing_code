- join_from_view: app_events
  join_to_view: videos
  join_type: always_left
  on_sql: ${app_events.video_id} = ${videos.id}
  relationship_type: assumed_many_to_one

# Relationship is defined in the data warehouse
- join_from_view: test_semantic_view__opportunity
  join_to_view: test_semantic_view___account
  join_type: always_left
  on_sql: ${test_semantic_view__opportunity.account_id} =
    ${test_semantic_view___account.id}
  relationship_type: assumed_many_to_one

# Events 
- join_from_view: app_events
  join_to_view: user
  join_type: always_left
  on_sql: ${app_events.user_id} = ${user.id}
  relationship_type: assumed_many_to_one

- join_from_view: customquery
  join_to_view: account
  join_type: always_left
  on_sql: ${customquery.id} = ${account.id}
  relationship_type: one_to_one
